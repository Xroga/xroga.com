# fly.toml app configuration file for xroga-api
#
# Deploy from THIS directory (backend/):
#   cd backend && fly deploy -a xroga-api

app = 'xroga-api'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'
  NODE_ENV = 'production'
  FRONTEND_URL = 'https://xroga.com'
  RUN_SWARM_WORKER = 'true'
  SWARM_WORKER_CONCURRENCY = '2'
  GPU_ENABLED = 'false'

[processes]
  app = 'node dist/index.js'
  worker = 'RUN_SWARM_WORKER=true node dist/index.js'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 2
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    soft_limit = 100
    hard_limit = 150

  [[http_service.checks]]
    grace_period = '30s'
    interval = '15s'
    method = 'GET'
    timeout = '10s'
    path = '/health'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2


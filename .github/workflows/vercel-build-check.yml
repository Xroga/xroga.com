name: Deploy Frontend to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Pinned SHAs — avoids flaky "Service Unavailable" when resolving @v5 tags
      - uses: actions/checkout@11bd71901bbe5b1630cea61d186275b11549cdc8 # v4.2.2

      - uses: actions/setup-node@cdca6185ca54a521c07c310cc32744c643daf25 # v4.3.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install and build frontend
        run: |
          npm ci
          npm run lint --workspace=frontend
          npm run build --workspace=frontend

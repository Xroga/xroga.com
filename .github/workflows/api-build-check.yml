name: API Docker build check

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'Dockerfile.api'
      - 'fly.api.toml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Build API image (same as Fly deploy)
        run: docker build -f Dockerfile.api -t xroga-api:ci .

name: Apply Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'scripts/apply-supabase-migrations.mjs'
      - 'scripts/lib/**'
      - '.github/workflows/supabase-migrate.yml'
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'scripts/apply-supabase-migrations.mjs'
      - 'scripts/lib/**'
      - '.github/workflows/supabase-migrate.yml'
  workflow_dispatch:

concurrency:
  group: supabase-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
        run: node scripts/apply-supabase-migrations.mjs

      - name: Dry-run on pull request
        if: github.event_name == 'pull_request'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
          DRY_RUN: '1'
        run: node scripts/apply-supabase-migrations.mjs --dry-run

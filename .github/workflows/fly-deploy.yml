name: Deploy to Fly.io

on:
  push:
    branches: [main]

concurrency:
  group: fly-deploy-xroga-api
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API to Fly.io
        run: |
          flyctl deploy . \
            --config fly.api.toml \
            -a xroga-api \
            --local-only \
            --ha=false \
            --strategy immediate
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DOCKER_BUILDKIT: 1

      - name: Verify health
        run: |
          sleep 10
          curl -fsS "https://xroga-api.fly.dev/health" | head -c 500
          echo ""
          curl -fsS "https://xroga-api.fly.dev/api/health/smoke-video" | head -c 800 || true
          echo ""

name: Deploy to Fly.io

on:
  push:
    branches: [main]

concurrency:
  group: fly-deploy-xroga-api
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Build and push image to Fly registry
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl auth docker
          IMAGE="registry.fly.io/xroga-api:${GITHUB_SHA}"
          docker build -f Dockerfile.api -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --config fly.api.toml \
            -a xroga-api \
            --image "$IMAGE" \
            --ha=false

      - name: Verify health
        run: |
          sleep 15
          curl -fsS "https://xroga-api.fly.dev/health"
          echo ""
          curl -fsS "https://xroga-api.fly.dev/api/health/smoke-video" | head -c 1000 || true
          echo ""

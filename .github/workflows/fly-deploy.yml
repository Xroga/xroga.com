name: Deploy to Fly.io

on:
  push:
    branches: [main]

concurrency:
  group: fly-deploy-xroga-api
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Remote builds avoid flaky `flyctl auth docker` / registry.fly.io 401s in CI.
      - name: Deploy to Fly.io (remote build)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          attempt=1
          max_attempts=4
          delay=12
          until flyctl deploy \
            --config fly.api.toml \
            -a xroga-api \
            --remote-only \
            --ha=false; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "flyctl deploy failed after ${max_attempts} attempts"
              exit 1
            fi
            echo "deploy failed (attempt ${attempt}/${max_attempts}) — retrying in ${delay}s"
            sleep "$delay"
            attempt=$((attempt + 1))
            delay=$((delay * 2))
          done

      - name: Verify health
        run: |
          sleep 15
          curl -fsS "https://xroga-api.fly.dev/health"
          echo ""
          curl -fsS "https://xroga-api.fly.dev/api/health"
          echo ""

name: Deploy API to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'Dockerfile.api'
      - 'fly.api.toml'
      - '.github/workflows/fly-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: |
          if [[ -z "${FLY_API_TOKEN:-}" ]]; then
            echo "::error::FLY_API_TOKEN secret is not set in GitHub repo settings."
            echo "Create one with: fly tokens create deploy -a xroga-api"
            exit 1
          fi
          flyctl deploy . --config fly.api.toml -a xroga-api --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
